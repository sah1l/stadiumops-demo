<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1B2133"/>
      <stop offset="100%" stop-color="#0B0F1A"/>
    </radialGradient>
    <linearGradient id="goldRing" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E6C76A"/>
      <stop offset="100%" stop-color="#8A6F2C"/>
    </linearGradient>
    <linearGradient id="pitch" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#166534"/>
    </linearGradient>
  </defs>

  <!-- rounded square background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- subtle gold border -->
  <rect x="0.75" y="0.75" width="62.5" height="62.5" rx="13.25" fill="none" stroke="#C9A449" stroke-opacity="0.25" stroke-width="1"/>

  <!-- outer stadium ring (gold tier) -->
  <ellipse cx="32" cy="32" rx="24" ry="18" fill="url(#goldRing)" opacity="0.95"/>

  <!-- mid ring (cut-out for sector look) -->
  <ellipse cx="32" cy="32" rx="20" ry="14.5" fill="#1B2133"/>

  <!-- sector dividers (8 spokes) -->
  <g stroke="#0B0F1A" stroke-width="1.4" stroke-linecap="round" opacity="0.9">
    <line x1="32" y1="14" x2="32" y2="50"/>
    <line x1="8" y1="32" x2="56" y2="32"/>
    <line x1="15" y1="19" x2="49" y2="45"/>
    <line x1="49" y1="19" x2="15" y2="45"/>
  </g>

  <!-- inner ring (lower bowl) -->
  <ellipse cx="32" cy="32" rx="17" ry="12" fill="#0E121C" stroke="#C9A449" stroke-opacity="0.4" stroke-width="0.8"/>

  <!-- pitch -->
  <ellipse cx="32" cy="32" rx="12" ry="7.5" fill="url(#pitch)"/>

  <!-- pitch center line + circle -->
  <line x1="32" y1="25" x2="32" y2="39" stroke="#FFFFFF" stroke-opacity="0.5" stroke-width="0.6"/>
  <circle cx="32" cy="32" r="2" fill="none" stroke="#FFFFFF" stroke-opacity="0.6" stroke-width="0.6"/>

  <!-- live signal dot (top-right) -->
  <circle cx="50" cy="14" r="3" fill="#EF4444"/>
  <circle cx="50" cy="14" r="3" fill="none" stroke="#EF4444" stroke-opacity="0.4" stroke-width="2"/>
</svg>
